<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

.header{
padding:40px 20px;
background:#000;
}

.profile{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
}

.followers{
margin-top:10px;
font-size:20px;
color:#aaa;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.gallery img{
width:100%;
border-radius:10px;
}

.video-section{
padding:40px;
}

video{
width:80%;
max-width:500px;
border-radius:10px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="header">

<img src="profile.jpg" class="profile">

<h2>Profile</h2>

<div class="followers">
22.5K Followers
</div>

</div>

<div class="gallery">

<img src="1.jpg">
<img src="2.jpg">
<img src="3.jpg">
<img src="4.jpg">
<img src="5.jpg">
<img src="6.jpg">
<img src="7.jpg">

</div>

<div class="video-section">

<h2>Videos</h2>

<video controls>
<source src="video1.mp4" type="video/mp4">
</video>

<video controls>
<source src="video2.mp4" type="video/mp4">
</video>

</div>

</body>
</html>
